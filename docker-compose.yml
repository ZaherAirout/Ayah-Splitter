services:
  ayah-splitter:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./audio_input:/data/uploads
      - ./output:/data/output
      # Cache HuggingFace model (tarteel-ai/whisper-base-ar-quran) across restarts
      - hf_model_cache:/root/.cache/huggingface
    environment:
      - FLASK_DEBUG=0
      - PORT=8080
    restart: unless-stopped

volumes:
  hf_model_cache:
